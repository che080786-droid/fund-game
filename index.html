      const weights = vi===0?[0.34,0.27,0.22,0.17]:vi===1?[0.29,0.25,0.23,0.23]:vi===2?[0.26,0.25,0.25,0.24]:[0.23,0.22,0.20,0.18];
      funds.push({
        id:`${sector}-${v.key}`,name:`${prefix}${v.label}`,code:String(code++).padStart(6,'0'),sector,
        risk,accent:sd.color,icon:sd.icon,vol:sd.vol*(0.84+v.concentration*0.38),cashRatio:v.cash,
        concentration:v.concentration,alpha:v.alpha+(si%3-1)*0.015,manager:MANAGERS[(si*4+vi)%MANAGERS.length],
        desc:v.desc,feeRules:null,holdings:sd.stocks.map((name,i)=>({name,weight:weights[i]})),
        valuation:clamp(sd.valuation+(vi-1.5)*6,5,95),turnover:[18,9,5,22][vi],
        navA:round(0.88+(hash(sector+v.key)%6200)/10000),navC:round(0.88+(hash(sector+v.key)%6200)/10000),
        change:0,estimate:0,historyA:[],historyC:[],maxDrawdown:0,drawdownDays:0
      });
    });
  });
  funds.forEach(f=>{f.historyA=[f.navA];f.historyC=[f.navC];const variant=f.id.split('-').at(-1);f.feeRules=buildFeeRules(f,variant)});
  return funds;
}

function tradingDates(count=60){
  const out=[];let d=new Date();d.setHours(12,0,0,0);
  while(out.length<count){const day=d.getDay();if(day!==0&&day!==6)out.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+1)}
  return out;
}

function initialState(){
  const dates=tradingDates(70);
  return {
    version:VERSION,started:false,day:0,stage:0,dates,cash:INITIAL_CASH,dayStartAsset:INITIAL_CASH,
    funds:makeFunds(),holdings:{},orders:[],records:[],newsHistory:[],currentMarket:null,
    watchlist:[],achievements:[],cancelCount:0,noTradeDays:0,cashStreak:0,brandClicks:0,bellClicks:0,
    realizedPnL:0,activeSector:'全部',calendarMode:'amount',calendarMonth:dates[0].slice(0,7),
    stats:{orders:0,shortFeePaid:0,totalFees:0,panicSells:0,profitSells:0},
    currentPage:'home',lastAction:'',ending:null,theme:'dark',experience:'new',beginnerMode:true,catSeen:0
  };
}
let state=initialState();

function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){}}
function migrateState(saved){
  const fresh=initialState();
  const merged={...fresh,...saved,version:VERSION,theme:saved.theme||'dark',experience:saved.experience||'new',beginnerMode:saved.beginnerMode??true,catSeen:saved.catSeen||0};
  const newFunds=makeFunds();
  merged.funds=newFunds.map(n=>{const old=(saved.funds||[]).find(x=>x.id===n.id);return old?{...n,...old,feeRules:n.feeRules}:n});
  merged.stats={...fresh.stats,...(saved.stats||{})};
  return merged;
}
function load(){
  try{const raw=localStorage.getItem(STORAGE_KEY)||localStorage.getItem(LEGACY_STORAGE_KEY);if(raw)state=migrateState(JSON.parse(raw))}catch(e){console.warn(e)}
  applyTheme();
}
function toast(msg){const el=$('#toast');el.textContent=msg;el.classList.add('show');clearTimeout(window.__toast);window.__toast=setTimeout(()=>el.classList.remove('show'),1900)}
function applyTheme(){document.documentElement.dataset.theme=state.theme||'dark';const b=$('#themeBtn');if(b)b.textContent=state.theme==='light'?'☀️':'🌙'}
function toggleTheme(){state.theme=state.theme==='light'?'dark':'light';applyTheme();save()}
function showFeedback(icon,title,lines,confetti=true){const box=$('#feedback');$('#feedbackIcon').textContent=icon;$('#feedbackTitle').textContent=title;$('#feedbackLines').innerHTML=lines.map((x,i)=>i===0?`<b>${x}</b>`:x).join('<br>');const layer=$('#feedbackConfetti');layer.innerHTML='';if(confetti){const bits=['✨','🎉','⭐','💫','📈'];for(let i=0;i<18;i++){const el=document.createElement('span');el.className='confetti';el.textContent=bits[i%bits.length];el.style.left=(Math.random()*100)+'%';el.style.animationDelay=(Math.random()*.45)+'s';el.style.animationDuration=(1.1+Math.random()*.8)+'s';layer.appendChild(el)}}box.classList.add('show');box.setAttribute('aria-hidden','false');try{navigator.vibrate?.(35)}catch(e){}}
function closeFeedback(){$('#feedback').classList.remove('show');$('#feedback').setAttribute('aria-hidden','true')}
function dateObj(str){return new Date(str+'T12:00:00')}
function dateLabel(str){const d=dateObj(str);return `${d.getMonth()+1}月${d.getDate()}日 周${'日一二三四五六'[d.getDay()]}`}
function currentDate(){return state.dates[state.day]}
function currentTime(){return TIME_STAGES[state.stage]}
function classNav(f,shareClass){return shareClass==='C'?f.navC:f.navA}
function holdingKey(fid,c){return `${fid}__${c}`}
function getHolding(fid,c){return state.holdings[holdingKey(fid,c)]}
function allHoldings(){return Object.values(state.holdings).filter(h=>h.units>1e-8)}
function fundById(id){return state.funds.find(f=>f.id===id)}
function frozenUnits(fid,c){return state.orders.filter(o=>o.type==='sell'&&o.fundId===fid&&o.shareClass===c&&o.status==='submitted').reduce((s,o)=>s+o.units,0)}
function availableUnits(h){return Math.max(0,h.units-frozenUnits(h.fundId,h.shareClass))}
function holdingValue(h){const f=fundById(h.fundId);return h.units*classNav(f,h.shareClass)}
function holdingsValue(){return allHoldings().reduce((s,h)=>s+holdingValue(h),0)}
function pendingAsset(){
  return state.orders.reduce((s,o)=>{
    if(o.type==='buy'&&o.status==='submitted')return s+o.amount;
    if(o.type==='buy'&&o.status==='priced')return s+o.units*classNav(fundById(o.fundId),o.shareClass);
    if(o.type==='sell'&&(o.status==='priced'||o.status==='settling'))return s+o.proceeds;
    return s;
  },0);
}
function totalAsset(){return state.cash+holdingsValue()+pendingAsset()}
function totalReturn(){return (totalAsset()/INITIAL_CASH-1)*100}
function cashRatio(){return state.cash/Math.max(totalAsset(),1)}
function mood(){const r=totalReturn();if(r>10)return'开始膨胀';if(r>3)return'嘴角上扬';if(r<-12)return'想卸载软件';if(r<-5)return'假装没看';if(cashRatio()<.05)return'满仓祈祷';return'冷静观察'}
function feeConfig(f,shareClass){return f.feeRules?.[shareClass]||buildFeeRules(f,f.id.split('-').at(-1))[shareClass]}
function holdingDays(h,atDay=state.day){return Math.max(0,atDay-h.confirmDay+1)}
function redemptionStep(days,f,shareClass){const rules=feeConfig(f,shareClass).redemption;return rules.find(x=>days<x.lt)||rules.at(-1)}
function redemptionRate(days,f,shareClass='A'){return redemptionStep(days,f,shareClass).rate}
function estimatedClassCost(f,shareClass,amount,days){const cfg=feeConfig(f,shareClass);const purchase=amount*cfg.purchase;const service=amount*cfg.service*days/365;const redemption=amount*redemptionRate(days,f,shareClass);return {purchase,service,redemption,total:purchase+service+redemption}}
function feeLadderHTML(f,shareClass,days){return feeConfig(f,shareClass).redemption.map(x=>`<div class="fee-ladder-row ${days<x.lt&&redemptionStep(days,f,shareClass)===x?'active':''}"><span>${x.label}</span><b>${(x.rate*100).toFixed(2)}%</b></div>`).join('')}
function settlementDays(f){if(f.sector==='海外')return 3;if(f.sector==='稳健')return 1;return 2}
function orderCanCancel(o){return o.status==='submitted'&&(state.day<o.effectiveDay||(state.day===o.effectiveDay&&state.stage<3))}
function effectiveDayForNewOrder(){return state.stage<3?state.day:state.day+1}
function maxDrawdown(vals){let peak=vals[0]||1,mdd=0,peakIndex=0,lowIndex=0;vals.forEach((v,i)=>{if(v>peak){peak=v;peakIndex=i}const dd=(v/peak-1)*100;if(dd<mdd){mdd=dd;lowIndex=i}});return {mdd,days:Math.max(0,lowIndex-peakIndex)}}
function chartSvg(vals,color){const w=300,h=96,min=Math.min(...vals),max=Math.max(...vals),span=max-min||1;const pts=vals.map((v,i)=>`${i/(Math.max(vals.length-1,1))*w},${h-((v-min)/span)*(h-12)-6}`).join(' ');return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" vector-effect="non-scaling-stroke"/><line x1="0" y1="${h/2}" x2="${w}" y2="${h/2}" stroke="#252d40" stroke-dasharray="4 4"/></svg>`}

function createMarketForDay(){
  const date=currentDate();const rand=rng(hash(date+'market-v5'));const news=deepClone(NEWS[Math.floor(rand()*NEWS.length)]);
  const marketBase=normal(rand)*0.55;
  const sectorReturns={};
  Object.entries(SECTORS).forEach(([sector,sd])=>{
    const expected=(news.all||0)+(news.impact?.[sector]||0);
    const crowd=news.crowding||0;
    let realizedImpact=expected;
    if(expected>1.5&&crowd>0.9&&rand()<0.42)realizedImpact=-Math.abs(expected)*(0.3+rand()*0.45);
    else realizedImpact=expected*(0.62+rand()*0.55);
    sectorReturns[sector]=clamp(marketBase+realizedImpact+normal(rand)*sd.vol*0.42,-9.8,9.8);
  });
  const fundReturns={};
  state.funds.forEach((f,i)=>{
    const stockNoise=normal(rand)*f.vol*0.36;
    const managerAlpha=(rand()-.48)*f.alpha*10;
    const cashBuffer=sectorReturns[f.sector]*(1-f.cashRatio);
    const concentrationShock=normal(rand)*f.concentration*f.vol*0.22;
    fundReturns[f.id]=clamp(cashBuffer+stockNoise+managerAlpha+concentrationShock,-12.5,12.5);
  });
  state.currentMarket={date,news,sectorReturns,fundReturns,closed:false};
  state.newsHistory.push({day:state.day,date,news,sectorReturns:null});
}
function estimateForFund(f){
  if(!state.currentMarket)return 0;
  if(state.currentMarket.closed)return state.currentMarket.fundReturns[f.id];
  const p=DAY_PROGRESS[state.stage];
  const final=state.currentMarket.fundReturns[f.id];
  const expected=(state.currentMarket.news.all||0)+(state.currentMarket.news.impact?.[f.sector]||0);
  const rand=rng(hash(currentDate()+f.id+state.stage));
  return clamp(final*p+expected*(1-p)*0.72+normal(rand)*f.vol*(1-p)*0.18,-12,12);
}
function updateEstimates(){state.funds.forEach(f=>f.estimate=estimateForFund(f))}

function processMorning(){
  let confirmedCount=0,settledCount=0;
  state.orders.forEach(o=>{
    if(o.type==='buy'&&o.status==='priced'&&o.confirmDay<=state.day){
      const key=holdingKey(o.fundId,o.shareClass);let h=state.holdings[key];
      if(!h){h={fundId:o.fundId,shareClass:o.shareClass,units:0,costAmount:0,confirmDay:state.day,lots:[],realized:0};state.holdings[key]=h}
      h.units+=o.units;h.costAmount+=o.amount;h.confirmDay=Math.min(h.confirmDay,state.day);h.lots.push({units:o.units,cost:o.amount,confirmDay:state.day});
      o.status='confirmed';o.confirmedAt=`${currentDate()} 09:30`;confirmedCount++;
    }
    if(o.type==='sell'&&(o.status==='priced'||o.status==='settling')&&o.settlementDay<=state.day){
      state.cash+=o.proceeds;o.status='settled';o.settledAt=`${currentDate()} 09:30`;settledCount++;
    }
  });
  if(confirmedCount)setTimeout(()=>showFeedback('🎉','份额确认成功',[`持仓 +${confirmedCount}`,'昨天的订单，今天正式住进账户。']),180);
  else if(settledCount)setTimeout(()=>showFeedback('💰','赎回到账',[`${settledCount} 笔资金已回到现金`,'基金猫：先别急着把它再花出去。']),180);
}

function processClose(){
  if(state.currentMarket.closed)return;
  state.currentMarket.closed=true;
  state.funds.forEach(f=>{
    const r=state.currentMarket.fundReturns[f.id];
    f.change=r;
    f.navA=round(Math.max(.1,f.navA*(1+r/100)),4);
    const cService=feeConfig(f,'C').service/252;
    f.navC=round(Math.max(.1,f.navC*(1+r/100)*(1-cService)),4);
    f.valuation=clamp(f.valuation+r*1.15+(Math.random()-.5)*2,3,97);
    f.historyA.push(f.navA);f.historyC.push(f.navC);if(f.historyA.length>80){f.historyA.shift();f.historyC.shift()}
    const dd=maxDrawdown(f.historyA);f.maxDrawdown=dd.mdd;f.drawdownDays=dd.days;
  });
  state.orders.filter(o=>o.status==='submitted'&&o.effectiveDay===state.day).forEach(o=>{
    const f=fundById(o.fundId);const nav=classNav(f,o.shareClass);
    if(o.type==='buy'){
      const fee=feeConfig(f,o.shareClass).purchase*o.amount;const net=o.amount-fee;
      o.fee=fee;o.price=nav;o.units=net/nav;o.status='priced';o.confirmDay=state.day+1;o.pricedAt=`${currentDate()} 15:00`;
      state.stats.totalFees+=fee;
    }else{
      const h=getHolding(o.fundId,o.shareClass);const days=holdingDays(h,state.day);const rate=redemptionRate(days,f,o.shareClass);const gross=o.units*nav;const fee=gross*rate;const proceeds=gross-fee;
      const unitRatio=o.units/Math.max(h.units,1e-9);const costAllocated=h.costAmount*unitRatio;
      h.units-=o.units;h.costAmount-=costAllocated;h.realized+=(proceeds-costAllocated);
      if(h.units<1e-7)delete state.holdings[holdingKey(o.fundId,o.shareClass)];
      o.price=nav;o.fee=fee;o.proceeds=proceeds;o.status='priced';o.holdingDays=days;o.settlementDay=state.day+settlementDays(f);o.pricedAt=`${currentDate()} 15:00`;
      state.realizedPnL+=proceeds-costAllocated;state.stats.totalFees+=fee;if(days<7){state.stats.shortFeePaid+=fee;unlock('short_fee')}
    }
  });
  const nh=state.newsHistory[state.newsHistory.length-1];if(nh)nh.sectorReturns=deepClone(state.currentMarket.sectorReturns);
  detectCloseAchievements();
}

function finalizeDay(){
  if(state.records.some(r=>r.day===state.day))return;
  const asset=totalAsset();const pnl=asset-state.dayStartAsset;const rate=state.dayStartAsset?pnl/state.dayStartAsset*100:0;
  const sorted=[...state.funds].sort((a,b)=>b.change-a.change);
  const todaysOrders=state.orders.filter(o=>o.createdDay===state.day).map(o=>({type:o.type,fundId:o.fundId,shareClass:o.shareClass,status:o.status,amount:o.amount,units:o.units||0}));
  state.records.push({day:state.day,date:currentDate(),asset,pnl,rate,news:state.currentMarket.news.title,top:{id:sorted[0].id,change:sorted[0].change},worst:{id:sorted.at(-1).id,change:sorted.at(-1).change},orders:todaysOrders});
  if(todaysOrders.length===0)state.noTradeDays++;else state.noTradeDays=0;
  if(state.noTradeDays>=5)unlock('look_only');
  if(cashRatio()>.2)state.cashStreak++;else state.cashStreak=0;if(state.cashStreak>=5)unlock('cash_king');
  if(rate<=-5)unlock('alarm');
  if(rate<-3&&!todaysOrders.some(o=>o.type==='sell'))unlock('diamond');
  detectPortfolioAchievements();
  save();
}

function nextDay(){
  finalizeDay();
  if(state.day>=MAX_DAYS-1){state.ending=buildEnding();unlock('finish');renderAll();openEnding();return}
  state.day++;state.stage=0;processMorning();state.dayStartAsset=totalAsset();createMarketForDay();updateEstimates();renderAll();save();toast('新交易日开盘');
}

function advanceTime(){
  if(state.stage<2){state.stage++;updateEstimates();renderAll();save();return}
  if(state.stage===2){state.stage=3;processClose();updateEstimates();renderAll();save();toast('15:00：今日净值已锁定');return}
  if(state.stage===3){state.stage=4;finalizeDay();renderAll();save();toast('净值更新完成，来复盘今天');return}
  nextDay();
}

function submitBuy(fid,shareClass,amount){
  const f=fundById(fid);amount=Number(amount);
  if(!amount||amount<=0)return toast('请输入有效金额');
  if(amount>state.cash+1e-6)return toast('可用现金不够');
  const eff=effectiveDayForNewOrder();if(eff>=state.dates.length)return toast('挑战已接近结束，暂不受理');
  state.cash-=amount;
  const o={id:'O'+Date.now()+Math.random().toString(36).slice(2,6),type:'buy',fundId:fid,shareClass,amount,status:'submitted',createdDay:state.day,createdAt:`${currentDate()} ${currentTime()}`,effectiveDay:eff};
  state.orders.unshift(o);state.stats.orders++;state.lastAction='buy';unlock('first_order');
  if(state.stage>=3)unlock('three_o_one');if(Math.round(amount)===617)unlock('six_seventeen');
  detectAC(fid);closeModal();renderAll();save();showFeedback('✨','买入申请成功！',[state.stage<3?'待确认订单 +1':'预约订单 +1',state.stage<3?'15:00 前可以撤单。':'将在下一交易日受理。','愿市场善待你。']);
}

function submitSell(fid,shareClass,ratio){
  const h=getHolding(fid,shareClass);if(!h)return toast('没有可卖持仓');
  const avail=availableUnits(h);const units=avail*ratio;if(units<=1e-8)return toast('可卖份额不足');
  const eff=effectiveDayForNewOrder();const f=fundById(fid);
  const o={id:'O'+Date.now()+Math.random().toString(36).slice(2,6),type:'sell',fundId:fid,shareClass,units,ratio,amount:units*classNav(f,shareClass),status:'submitted',createdDay:state.day,createdAt:`${currentDate()} ${currentTime()}`,effectiveDay:eff};
  state.orders.unshift(o);state.stats.orders++;state.lastAction='sell';unlock('first_order');if(state.stage>=3)unlock('three_o_one');
  const pnlRate=(holdingValue(h)/h.costAmount-1)*100;if(ratio>.98&&Math.abs(pnlRate)<=.5)unlock('break_even_sell');
  closeModal();renderAll();save();showFeedback('🪽','赎回申请成功！',[state.stage<3?'待处理订单 +1':'预约赎回 +1',state.stage<3?'15:00 前仍可以撤单。':'将在下一交易日受理。','基金猫：希望不是卖飞。'],false);
}

function cancelOrder(id){
  const o=state.orders.find(x=>x.id===id);if(!o||!orderCanCancel(o))return toast('该订单已经不能撤销');
  if(o.type==='buy')state.cash+=o.amount;
  o.status='cancelled';o.cancelledAt=`${currentDate()} ${currentTime()}`;state.cancelCount++;if(state.cancelCount>=3)unlock('cancel_master');
  renderAll();save();toast('撤单成功');
}

function detectAC(fid){
  const a=getHolding(fid,'A'),c=getHolding(fid,'C');
  const pendingA=state.orders.some(o=>o.fundId===fid&&o.shareClass==='A'&&['submitted','priced'].includes(o.status));
  const pendingC=state.orders.some(o=>o.fundId===fid&&o.shareClass==='C'&&['submitted','priced'].includes(o.status));
  if((a||pendingA)&&(c||pendingC))unlock('ac_twins');
}
function detectPortfolioAchievements(){
  const sectors=new Set(allHoldings().map(h=>fundById(h.fundId).sector));if(sectors.size>=4)unlock('diversified');
  const cpo=allHoldings().filter(h=>fundById(h.fundId).sector==='CPO');if(cpo.length>=3&&state.currentMarket?.sectorReturns?.CPO<0)unlock('cpo_bad');
  const chip=allHoldings().filter(h=>fundById(h.fundId).sector==='半导体');if(chip.some(h=>fundById(h.fundId).maxDrawdown<=-15))unlock('chip_victim');
}
function detectCloseAchievements(){
  const n=state.currentMarket.news;
  const todayBuys=state.orders.filter(o=>o.type==='buy'&&o.createdDay===state.day);
  todayBuys.forEach(o=>{
    const f=fundById(o.fundId);const expected=(n.impact?.[f.sector]||0)+(n.all||0);
    if(expected>2&&state.currentMarket.fundReturns[f.id]<0)unlock('good_news_bad_close');
  });
  const byFund={};state.orders.filter(o=>o.type==='buy'&&o.createdDay>=state.day-4).forEach(o=>(byFund[o.fundId]??=[]).push(o.createdDay));
  Object.entries(byFund).forEach(([fid,days])=>{
    const f=fundById(fid);const recent=state.records.slice(-3);if(new Set(days).size>=3&&recent.length>=2&&recent.every(r=>fundById(fid).historyA.length>1)&&f.change<0)unlock('average_down');
  });
  detectPortfolioAchievements();
}
function unlock(id){if(!state.achievements.includes(id)){state.achievements.push(id);const a=ACHIEVEMENTS.find(x=>x.id===id);if(a)toast(`解锁成就：${a.name}`)}}
function achievementProgress(a){
  switch(a.id){
    case'first_order':return state.stats.orders? '已完成':'0 / 1 笔';
    case'three_o_one':return state.achievements.includes(a.id)?'已完成':'15:00 后试一次（游戏里）';
    case'cancel_master':return `${Math.min(state.cancelCount,3)} / 3 次`;
    case'look_only':return `${Math.min(state.noTradeDays,5)} / 5 日`;
    case'cash_king':return `${Math.min(state.cashStreak,5)} / 5 日`;
    case'diversified':return `${Math.min(new Set(allHoldings().map(h=>fundById(h.fundId).sector)).size,4)} / 4 板块`;
    case'finish':return `${Math.min(state.records.length,30)} / 30 日`;
    default:return state.achievements.includes(a.id)?'已解锁':'等待触发';
  }
}

function buildEnding(){
  const held=allHoldings();const avgRisk=held.length?held.reduce((s,h)=>s+fundById(h.fundId).risk*holdingValue(h),0)/Math.max(holdingsValue(),1):0;
  const orders=state.stats.orders;const cash=cashRatio();let type='冷静观察者',emoji='🧠',text='你愿意先看清规则，再决定要不要下注。';
  if(avgRisk>4&&orders>12){type='赛道冲浪者';emoji='🏄';text='你爱高波动，也开始学会给信仰配安全绳。'}
  else if(cash>.45){type='现金堡垒建造师';emoji='🏰';text='你把选择权看得比热闹更重要。'}
  else if(new Set(held.map(h=>fundById(h.fundId).sector)).size>=5){type='组合园丁';emoji='🌱';text='你不赌一朵花，而是照顾一整个花园。'}
  else if(state.cancelCount>=3){type='反悔型风控官';emoji='↩️';text='你经常改变主意，但至少改变发生在成交前。'}
  return {type,emoji,text,asset:totalAsset(),return:totalReturn(),fees:state.stats.totalFees,achievements:state.achievements.length};
}

  const f=fundById(fid),pane=$('#tradePane');if(!pane)return;
  if(mode==='buy'){
    const a=feeConfig(f,'A'),c=feeConfig(f,'C');pane.innerHTML=`<div class="share-select"><button class="share-option ${preferredClass==='A'?'active':''}" data-share="A"><b>A 类</b><p>申购费 ${(a.purchase*100).toFixed(2)}%，无销售服务费</p></button><button class="share-option ${preferredClass==='C'?'active':''}" data-share="C"><b>C 类</b><p>0申购费，销售服务费 ${(c.service*100).toFixed(2)}%/年</p></button></div><div class="amount-box"><label>买入金额 · 可用 ${fmtMoney(state.cash)}</label><input id="tradeAmount" type="number" inputmode="decimal" placeholder="1000" value="1000" /></div><div class="quick-amounts"><button data-amount="1000">¥1,000</button><button data-amount="3000">¥3,000</button><button data-amount="10000">¥10,000</button><button data-amount="all">全部</button></div><div class="fee-plan"><div class="fee-plan-head"><span>预计持有时间</span><b><span id="planDaysLabel">20</span> 天</b></div><input class="range" id="planDays" type="range" min="1" max="365" value="20"/><div id="feeCompare"></div></div>${state.beginnerMode?'<div class="beginner-note">🐱 A/C 类的投资方向相同，差别主要在费用。别只看申购费，还要看计划持有多久以及这只基金自己的赎回费阶梯。</div>':''}<div class="hint warning" id="tradeHint" style="margin-top:10px">${tradeTimingText('buy')}</div><button class="primary" data-submit-buy="${fid}" data-class="${preferredClass}">提交买入订单</button>`;setTimeout(()=>updateFeeCompare(fid),0);
  }else{
    const holdings=['A','C'].map(c=>getHolding(fid,c)).filter(Boolean);if(!holdings.length){pane.innerHTML='<div class="empty-state">没有已确认持仓，暂时不能卖出。</div>';return}
    let c=holdings.some(h=>h.shareClass===preferredClass)?preferredClass:holdings[0].shareClass;const h=getHolding(fid,c),avail=availableUnits(h),days=holdingDays(h),rate=redemptionRate(days,f,c);
    pane.innerHTML=`<div class="share-select">${holdings.map(x=>`<button class="share-option ${x.shareClass===c?'active':''}" data-sell-class="${x.shareClass}"><b>${x.shareClass} 类持仓</b><p>${x.units.toFixed(2)}份 · 持有${holdingDays(x)}天</p></button>`).join('')}</div><div class="amount-box"><label>卖出比例 <b id="sellPct">50%</b></label><input class="range" id="sellRange" type="range" min="1" max="100" value="50"/><div class="hint" id="sellPreview">预计卖出 ${(avail*.5).toFixed(2)} 份，短期赎回费率 ${(rate*100).toFixed(2)}%</div></div><div class="quick-amounts"><button data-sell-ratio="25">25%</button><button data-sell-ratio="50">50%</button><button data-sell-ratio="75">75%</button><button data-sell-ratio="100">全部</button></div><div class="fee-plan"><div class="fee-plan-head"><span>${c}类赎回费阶梯</span><b>当前 ${(rate*100).toFixed(2)}%</b></div><div class="fee-ladder">${feeLadderHTML(f,c,days)}</div></div><div class="hint warning" style="margin-top:10px">${tradeTimingText('sell')}</div><button class="primary" data-submit-sell="${fid}" data-class="${c}">提交赎回订单</button>`;
  }
}
function updateFeeCompare(fid){const f=fundById(fid),amount=Number($('#tradeAmount')?.value||1000),days=Number($('#planDays')?.value||20),box=$('#feeCompare');if(!box)return;$('#planDaysLabel').textContent=days;const a=estimatedClassCost(f,'A',amount,days),c=estimatedClassCost(f,'C',amount,days),best=a.total<=c.total?'A':'C';box.innerHTML=`<div class="fee-compare"><div class="fee-box ${best==='A'?'best':''}"><b>A 类预计总费用</b><strong>${fmtMoney(a.total)}</strong><small>申购 ${fmtMoney(a.purchase)} · 服务 ${fmtMoney(a.service)} · 赎回 ${fmtMoney(a.redemption)}</small></div><div class="fee-box ${best==='C'?'best':''}"><b>C 类预计总费用</b><strong>${fmtMoney(c.total)}</strong><small>申购 ${fmtMoney(c.purchase)} · 服务 ${fmtMoney(c.service)} · 赎回 ${fmtMoney(c.redemption)}</small></div></div><div class="hint" style="margin-top:8px">🐱 按当前金额和持有计划，${best} 类预计少花 ${fmtMoney(Math.abs(a.total-c.total))}。这只是模拟估算，真正下单要看具体产品费率表。</div>`}
function openLearning(term){const terms={estimate:['盘中估算','根据板块和模拟持仓推算的实时涨跌，不是最终净值。15:00 后才揭晓。'],drawdown:['最大回撤','历史高点到后来最低点，曾经最多跌了多少。它是在问：最难熬的时候有多难熬？'],valuation:['估值百分位','当前估值在自身模拟历史中所处的位置。80%表示比过去大约80%的时候更贵，但不代表马上会跌。'],ac:['A/C 类','投资方向通常相同，费用收法不同。A常见申购费，C常见销售服务费；两类还可能有不同的赎回费阶梯。'],t1:['T+1 与15:00','15:00前提交，通常按当天收盘净值定价；15:00后顺延到下一交易日。份额确认和资金到账还需要时间。']};const [title,text]=terms[term]||['基金猫课堂','慢慢玩，规则会一点点认识。'];openModal(`<div class="modal-head"><div><h2>🐱 ${title}</h2><p>基金猫的一句话翻译</p></div><button class="close" data-close>✕</button></div><div class="cat-tip"><div class="cat-avatar">🐱</div><div class="cat-bubble">${text}</div></div>`)}
function openCat(){state.catSeen++;$('#catDot').textContent=Math.max(0,3-state.catSeen);$('#catDot').style.display=state.catSeen>=3?'none':'grid';openModal(`<div class="modal-head"><div><h2>🐱 基金猫</h2><p>不替你做决定，只负责在你上头时挠一下。</p></div><button class="close" data-close>✕</button></div><div class="cat-tip"><div class="cat-avatar">🐱</div><div class="cat-bubble">${catMessage()}</div></div><div class="coach-toggle"><span>新手讲解模式</span><input type="checkbox" id="coachToggle" ${state.beginnerMode?'checked':''}></div><div class="cat-actions"><button data-term="ac">A/C类怎么选</button><button data-term="t1">三点和T+1</button><button data-term="drawdown">什么是回撤</button><button data-action="learn">打开入门课</button></div>`,()=>save())}
function openLearningCenter(){openModal(`<div class="modal-head"><div><h2>🌱 基金入门</h2><p>不会也没关系，先记住五件事。</p></div><button class="close" data-close>✕</button></div><div class="lesson"><b>1. 基金买入不会立刻出现份额</b><p>订单先提交，收盘按净值定价，之后再确认。</p></div><div class="lesson"><b>2. 15:00 是重要分界线</b><p>三点前通常属于今天，三点后通常顺延到下一交易日。</p></div><div class="lesson"><b>3. A/C 类主要差在费用</b><p>结合申购费、销售服务费、赎回费阶梯和持有时间一起算。</p></div><div class="lesson"><b>4. 涨得多的基金也可能更难拿住</b><p>收益和波动是一对绑定出售的东西。</p></div><div class="lesson"><b>5. 新闻利好不保证上涨</b><p>价格可能早已反映预期，资金也可能借利好兑现。</p></div>`)}
function tradeTimingText(type){const eff=effectiveDayForNewOrder(),f=state.dates[eff];if(state.stage<3)return `当前 ${currentTime()}：订单按今日收盘净值定价，15:00 前可撤单。`;return `当前已过 15:00：订单将于 ${f?dateLabel(f):'下一交易日'} 受理，在该日 15:00 前仍可撤单。`}
function openRecord(day){const r=state.records.find(x=>x.day===day);if(!r)return;const top=fundById(r.top.id),worst=fundById(r.worst.id);openModal(`<div class="modal-head"><div><h2>${dateLabel(r.date)} 复盘</h2><p>${r.news}</p></div><button class="close" data-close>✕</button></div><div class="metric-row"><div class="metric"><span>当日收益</span><b class="${cls(r.pnl)}">${fmtMoney(r.pnl)}</b></div><div class="metric"><span>收益率</span><b class="${cls(r.rate)}">${fmtPct(r.rate)}</b></div><div class="metric"><span>最强基金</span><b>${top.name}</b></div><div class="metric"><span>最弱基金</span><b>${worst.name}</b></div></div><div class="divider"></div><div class="hint">当日订单：${r.orders.length?r.orders.map(o=>`${o.type==='buy'?'买入':'卖出'} ${fundById(o.fundId).name}${o.shareClass}`).join('；'):'没有交易。少做也可能是好决策。'}</div>`)}
function openAchievement(id){const a=ACHIEVEMENTS.find(x=>x.id===id);if(!a)return;const open=state.achievements.includes(id);openModal(`<div class="modal-head"><div><h2>${open?a.emoji:'🔒'} ${open?a.name:(a.hidden?'隐藏成就':a.name)}</h2><p>${open?'已经解锁':'还没有解锁'}</p></div><button class="close" data-close>✕</button></div><div class="card"><div class="hint"><b>解锁条件</b><br>${open||!a.hidden?a.condition:'条件暂时保密，彩蛋要自己撞见才好玩。'}</div><div class="divider"></div><div class="hint"><b>当前进度</b><br>${achievementProgress(a)}</div>${open?`<div class="divider"></div><div class="hint"><b>系统吐槽</b><br>${a.roast}</div><div class="divider"></div><div class="hint"><b>留下的教训</b><br>${a.lesson}</div>`:''}</div>`)}
function showTrades(){setPage('orders')}
function openEnding(){const e=state.ending;openModal(`<div style="text-align:center"><div style="font-size:56px">${e.emoji}</div><h2>${e.type}</h2><p>${e.text}</p></div><div class="metric-row"><div class="metric"><span>最终资产</span><b>${fmtMoney(e.asset)}</b></div><div class="metric"><span>总收益率</span><b class="${cls(e.return)}">${fmtPct(e.return)}</b></div><div class="metric"><span>累计费用</span><b>${fmtMoney(e.fees)}</b></div><div class="metric"><span>解锁成就</span><b>${e.achievements}</b></div></div><button class="secondary" data-action="reset-game">重新挑战</button>`)}
function openModal(html,after){$('#modal').innerHTML=html;$('#modalWrap').classList.add('show');$('#modalWrap').setAttribute('aria-hidden','false');after?.()}
function closeModal(){$('#modalWrap').classList.remove('show');$('#modalWrap').setAttribute('aria-hidden','true')}
function setPage(page,scroll=true){state.currentPage=page;$$('.page').forEach(p=>p.classList.add('hidden'));$(`#page-${page}`).classList.remove('hidden');$$('.bottom-nav button').forEach(b=>b.classList.toggle('active',b.dataset.nav===page));if(scroll)window.scrollTo({top:0,behavior:'smooth'});save()}
function resetGame(){if(!confirm('重新开始会清空 V6 的持仓、订单和成就，确定吗？'))return;localStorage.removeItem(STORAGE_KEY);location.reload()}

function bindEvents(){
  document.addEventListener('click',e=>{
    const exp=e.target.closest('[data-experience]');if(exp){state.experience=exp.dataset.experience;state.beginnerMode=state.experience==='new';$$('[data-experience]').forEach(x=>x.classList.toggle('active',x===exp));return}
    const nav=e.target.closest('[data-nav]');if(nav)return setPage(nav.dataset.nav);
    if(e.target.closest('#themeBtn'))return toggleTheme();
    if(e.target.closest('#catBtn'))return openCat();
    const term=e.target.closest('[data-term]');if(term)return openLearning(term.dataset.term);
    if(e.target.closest('[data-action="learn"]'))return openLearningCenter();
    const page=e.target.closest('[data-page]');if(page)return setPage(page.dataset.page);
    const adv=e.target.closest('[data-action="advance"]');if(adv)return advanceTime();
    const fund=e.target.closest('[data-fund]');if(fund&&!e.target.closest('[data-watch]'))return openFund(fund.dataset.fund,fund.dataset.mode||'buy',fund.dataset.class||'A');
    const watch=e.target.closest('[data-watch]');if(watch){e.stopPropagation();const id=watch.dataset.watch;state.watchlist=state.watchlist.includes(id)?state.watchlist.filter(x=>x!==id):[...state.watchlist,id];renderAll();return}
    const sec=e.target.closest('[data-sector]');if(sec){state.activeSector=sec.dataset.sector;renderMarket();return}
    const cancel=e.target.closest('[data-cancel]');if(cancel)return cancelOrder(cancel.dataset.cancel);
    const cal=e.target.closest('[data-cal-mode]');if(cal){state.calendarMode=cal.dataset.calMode;renderCalendar();save();return}
    const rec=e.target.closest('[data-record]');if(rec)return openRecord(Number(rec.dataset.record));
    const ach=e.target.closest('[data-achievement]');if(ach)return openAchievement(ach.dataset.achievement);
    if(e.target.closest('[data-close]'))return closeModal();
    const tm=e.target.closest('[data-trade-mode]');if(tm){const fid=$('[data-submit-buy],[data-submit-sell]')?.dataset.submitBuy||$('[data-submit-sell]')?.dataset.submitSell||$('#modal h2')?.dataset?.fid;const activeFundId=$('#modal').querySelector('[data-submit-buy]')?.dataset.submitBuy||$('#modal').querySelector('[data-submit-sell]')?.dataset.submitSell||state.__modalFund;if(state.__modalFund)renderTradePane(state.__modalFund,tm.dataset.tradeMode,'A');return}
    const share=e.target.closest('[data-share]');if(share){renderTradePane(state.__modalFund,'buy',share.dataset.share);return}
    const sellClass=e.target.closest('[data-sell-class]');if(sellClass){renderTradePane(state.__modalFund,'sell',sellClass.dataset.sellClass);return}
    const amt=e.target.closest('[data-amount]');if(amt){const input=$('#tradeAmount');if(input)input.value=amt.dataset.amount==='all'?Math.floor(state.cash):amt.dataset.amount;return}
    const sr=e.target.closest('[data-sell-ratio]');if(sr){const range=$('#sellRange');if(range){range.value=sr.dataset.sellRatio;range.dispatchEvent(new Event('input',{bubbles:true}))}return}
    const buy=e.target.closest('[data-submit-buy]');if(buy){return submitBuy(buy.dataset.submitBuy,buy.dataset.class,$('#tradeAmount')?.value)}
    const sell=e.target.closest('[data-submit-sell]');if(sell){return submitSell(sell.dataset.submitSell,sell.dataset.class,Number($('#sellRange')?.value||50)/100)}
    if(e.target.closest('[data-action="show-trades"]'))return showTrades();
    if(e.target.closest('[data-action="reset-game"]'))return resetGame();
    if(e.target.closest('[data-action="open-news"]'))return setPage('news');
  });
  document.addEventListener('input',e=>{
    if(e.target.id==='planDays'||e.target.id==='tradeAmount'){if(state.__modalFund)updateFeeCompare(state.__modalFund)}
    if(e.target.id==='coachToggle'){state.beginnerMode=e.target.checked;save()}
    if(e.target.id==='sellRange'){
      const pct=Number(e.target.value),btn=$('[data-submit-sell]');if(!btn)return;const h=getHolding(btn.dataset.submitSell,btn.dataset.class),f=fundById(btn.dataset.submitSell);if(!h)return;const units=availableUnits(h)*pct/100,days=holdingDays(h),rate=redemptionRate(days,f,h.shareClass),gross=units*classNav(f,h.shareClass);$('#sellPct').textContent=pct+'%';$('#sellPreview').textContent=`预计卖出 ${units.toFixed(2)} 份，费率 ${(rate*100).toFixed(2)}%，预计到账 ${fmtMoney(gross*(1-rate))}`;
    }
  });
  $('#modalWrap').addEventListener('click',e=>{if(e.target===$('#modalWrap'))closeModal()});
  $('#feedbackClose').addEventListener('click',closeFeedback);$('#feedback').addEventListener('click',e=>{if(e.target===$('#feedback'))closeFeedback()});
  $('#startBtn').addEventListener('click',()=>{state.started=true;$('#boot').classList.add('hidden');$('#app').classList.remove('hidden');if(!state.currentMarket)createMarketForDay();state.dayStartAsset=totalAsset();updateEstimates();renderAll();save();if(state.beginnerMode)setTimeout(()=>showFeedback('🐱','基金猫上班啦！',['新手讲解已开启','看不懂的词可以点问号。','先用小额熟悉规则。'],false),260)});
  $('#bellBtn').addEventListener('click',()=>{state.bellClicks++;if(state.bellClicks>=7)unlock('moon')});
  $('#brandEaster').addEventListener('click',()=>{state.brandClicks++;if(state.brandClicks>=7){unlock('moon');renderAchievements();save()}});
  $('#clockBtn').addEventListener('click',()=>openModal(`<div class="modal-head"><div><h2>交易时钟</h2><p>${dateLabel(currentDate())} ${currentTime()}</p></div><button class="close" data-close>✕</button></div><div class="timeline"><div class="timeline-item"><i></i><div><b>15:00 前</b><p>按当日收盘净值定价，可在截止前撤单。</p></div></div><div class="timeline-item"><i></i><div><b>15:00 及以后</b><p>订单顺延到下一交易日，按下一交易日净值定价。</p></div></div><div class="timeline-item"><i></i><div><b>下一交易日</b><p>买入份额确认；赎回资金根据基金类型继续等待到账。</p></div></div></div><div class="hint">本游戏采用简化模拟。真实产品的确认时间、到账时间与费用以基金合同和销售平台规则为准。</div>`));
}

// Wrap openFund so modal event handlers always know which fund is active.
const _openFund=openFund;
openFund=function(fid,mode='buy',preferredClass='A'){state.__modalFund=fid;_openFund(fid,mode,preferredClass)};

load();
if(!state.currentMarket)createMarketForDay();
updateEstimates();
bindEvents();
if(state.started){$('#boot').classList.add('hidden');$('#app').classList.remove('hidden')}else{$$('[data-experience]').forEach(x=>x.classList.toggle('active',x.dataset.experience===state.experience))}
renderAll();
})();

</script>
</body>
</html>
