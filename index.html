  function dateObj(str){return new Date(str+'T12:00:00')}

    while(out.length<count){const day=d.getDay();if(day!==0&&day!==6)out.push(isoDate(d));d.setDate(d.getDate()+1)}
    return out;
  }
  function calendarDaysBetween(start,end){if(!start||!end)return 0;return Math.max(0,Math.round((dateObj(end)-dateObj(start))/86400000))}

  root.Calendar={TIME_STAGES,STAGE_LABELS,DAY_PROGRESS,dateObj,isoDate,dateLabel,isWeekend,tradingDates,calendarDaysBetween,closedNaturalDaysBetween};

function createMarketForDay(){
  const date=currentDate();const rand=rng(hash(date+'market-v5'));const news=deepClone(NEWS[Math.floor(rand()*NEWS.length)]);
  const marketBase=normal(rand)*0.55;
  const sectorReturns={};
  Object.entries(SECTORS).forEach(([sector,sd])=>{
    const expected=(news.all||0)+(news.impact?.[sector]||0);
    const crowd=news.crowding||0;
    let realizedImpact=expected;
    if(expected>1.5&&crowd>0.9&&rand()<0.42)realizedImpact=-Math.abs(expected)*(0.3+rand()*0.45);
    else realizedImpact=expected*(0.62+rand()*0.55);
    sectorReturns[sector]=clamp(marketBase+realizedImpact+normal(rand)*sd.vol*0.42,-9.8,9.8);
  });
  const fundReturns={};
  state.funds.forEach((f,i)=>{
    const stockNoise=normal(rand)*f.vol*0.36;
    const managerAlpha=(rand()-.48)*f.alpha*10;
    const cashBuffer=sectorReturns[f.sector]*(1-f.cashRatio);
    const concentrationShock=normal(rand)*f.concentration*f.vol*0.22;
    fundReturns[f.id]=clamp(cashBuffer+stockNoise+managerAlpha+concentrationShock,-12.5,12.5);
  });
  state.currentMarket={date,news,sectorReturns,fundReturns,closed:false};
  state.newsHistory.push({day:state.day,date,news,sectorReturns:null});
}
function estimateForFund(f){
  if(!state.currentMarket)return 0;

  const p=DAY_PROGRESS[state.stage];
  const final=state.currentMarket.fundReturns[f.id];
  const expected=(state.currentMarket.news.all||0)+(state.currentMarket.news.impact?.[f.sector]||0);
  const rand=rng(hash(currentDate()+f.id+state.stage));
  return clamp(final*p+expected*(1-p)*0.72+normal(rand)*f.vol*(1-p)*0.18,-12,12);
}
function updateEstimates(){state.funds.forEach(f=>f.estimate=estimateForFund(f))}

function evaluateBuyDecision(o){

}

    const a=feeConfig(f,'A'),c=feeConfig(f,'C');pane.innerHTML=`<div class="share-select"><button class="share-option ${preferredClass==='A'?'active':''}" data-share="A"><b>A 类</b><p>申购费 ${(a.purchase*100).toFixed(2)}%，无销售服务费</p></button><button class="share-option ${preferredClass==='C'?'active':''}" data-share="C"><b>C 类</b><p>0申购费，销售服务费 ${(c.service*100).toFixed(2)}%/年</p></button></div><div class="amount-box"><label>买入金额 · 可用 ${fmtMoney(state.cash)}</label><input id="tradeAmount" type="number" inputmode="decimal" placeholder="1000" value="1000" /></div><div class="quick-amounts"><button data-amount="1000">¥1,000</button><button data-amount="3000">¥3,000</button><button data-amount="10000">¥10,000</button><button data-amount="all">全部</button></div><div class="reason-box"><label for="buyReason">为什么买？</label><select id="buyReason"><option value="">请选择你的真实理由</option>${Object.entries(BUY_REASONS).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select></div><div class="fee-plan"><div class="fee-plan-head"><span>预计持有时间</span><b><span id="planDaysLabel">20</span> 天</b></div><input class="range" id="planDays" type="range" min="1" max="365" value="20"/><div id="feeCompare"></div></div>${state.experience==='new'||state.beginnerMode?'<div class="beginner-note">🐱 A/C 类的投资方向相同，差别主要在费用。别只看申购费，还要看计划持有多久以及这只基金自己的赎回费阶梯。</div>':''}<div class="hint warning" id="tradeHint" style="margin-top:10px">${tradeTimingText('buy')}</div><button class="primary" data-submit-buy="${fid}" data-class="${preferredClass}">提交买入订单</button>`;setTimeout(()=>updateFeeCompare(fid),0);
  }else{
    const holdings=['A','C'].map(c=>getHolding(fid,c)).filter(Boolean);if(!holdings.length){pane.innerHTML='<div class="empty-state">没有已确认持仓，暂时不能卖出。</div>';return}
    let c=holdings.some(h=>h.shareClass===preferredClass)?preferredClass:holdings[0].shareClass;const h=getHolding(fid,c),avail=availableUnits(h),targetDate=state.dates[effectiveDayForNewOrder()]||currentDate(),preview=previewSellLots(h,avail*.5,f,classNav(f,c),targetDate),age=holdingAgeSummary(h,targetDate);
    pane.innerHTML=`<div class="share-select">${holdings.map(x=>{const a=holdingAgeSummary(x,targetDate);return `<button class="share-option ${x.shareClass===c?'active':''}" data-sell-class="${x.shareClass}"><b>${x.shareClass} 类持仓</b><p>${x.units.toFixed(2)}份 · ${a.count}批 · 最早${a.oldest}自然日</p></button>`}).join('')}</div><div class="amount-box"><label>卖出比例 <b id="sellPct">50%</b></label><input class="range" id="sellRange" type="range" min="1" max="100" value="50"/><div class="hint" id="sellPreview">预计卖出 ${(avail*.5).toFixed(2)} 份，综合费率 ${(preview.weightedRate*100).toFixed(2)}%，预计到账 ${fmtMoney(preview.proceeds)}</div></div><div class="quick-amounts"><button data-sell-ratio="25">25%</button><button data-sell-ratio="50">50%</button><button data-sell-ratio="75">75%</button><button data-sell-ratio="100">全部</button></div>${lotSummaryHTML(h,f,avail*.5)}<div class="fee-plan"><div class="fee-plan-head"><span>${c}类赎回费阶梯</span><b>各批分别计算</b></div><div class="fee-ladder">${feeLadderHTML(f,c,age.oldest)}</div></div><div class="hint warning" style="margin-top:10px">${tradeTimingText('sell')}</div><button class="primary" data-submit-sell="${fid}" data-class="${c}">提交赎回订单</button>`;
  }

function updateFeeCompare(fid){const f=fundById(fid),amount=Number($('#tradeAmount')?.value||1000),days=Number($('#planDays')?.value||20),box=$('#feeCompare');if(!box)return;$('#planDaysLabel').textContent=days;const a=estimatedClassCost(f,'A',amount,days),c=estimatedClassCost(f,'C',amount,days),best=a.total<=c.total?'A':'C';box.innerHTML=`<div class="fee-compare"><div class="fee-box ${best==='A'?'best':''}"><b>A 类预计总费用</b><strong>${fmtMoney(a.total)}</strong><small>申购 ${fmtMoney(a.purchase)} · 服务 ${fmtMoney(a.service)} · 赎回 ${fmtMoney(a.redemption)}</small></div><div class="fee-box ${best==='C'?'best':''}"><b>C 类预计总费用</b><strong>${fmtMoney(c.total)}</strong><small>申购 ${fmtMoney(c.purchase)} · 服务 ${fmtMoney(c.service)} · 赎回 ${fmtMoney(c.redemption)}</small></div></div><div class="hint" style="margin-top:8px">🐱 按当前金额和持有计划，${best} 类预计少花 ${fmtMoney(Math.abs(a.total-c.total))}。这只是模拟估算，真正下单要看具体产品费率表。</div>`}
function openLearning(term){const terms={estimate:['盘中估算','根据板块和模拟持仓推算的实时涨跌，不是最终净值。15:00 后才揭晓。'],drawdown:['最大回撤','历史高点到后来最低点，曾经最多跌了多少。它是在问：最难熬的时候有多难熬？'],valuation:['估值百分位','当前估值在自身模拟历史中所处的位置。80%表示比过去大约80%的时候更贵，但不代表马上会跌。'],ac:['A/C 类','投资方向通常相同，费用收法不同。A常见申购费，C常见销售服务费；两类还可能有不同的赎回费阶梯。'],t1:['T+1 与15:00','15:00前提交，通常按当天收盘净值定价；15:00后顺延到下一交易日。份额确认和资金到账还需要时间。']};const [title,text]=terms[term]||['基金猫课堂','慢慢玩，规则会一点点认识。'];openModal(`<div class="modal-head"><div><h2>🐱 ${title}</h2><p>基金猫的一句话翻译</p></div><button class="close" data-close>✕</button></div><div class="cat-tip"><div class="cat-avatar">🐱</div><div class="cat-bubble">${text}</div></div>`)}
function openCat(){state.catSeen++;state.catClicks=(state.catClicks||0)+1;if(state.catClicks>=9)unlock('cat_staff');$('#catDot').textContent=Math.max(0,3-state.catSeen);$('#catDot').style.display=state.catSeen>=3?'none':'grid';openModal(`<div class="modal-head"><div><h2>🐱 基金猫</h2><p>不替你做决定，只负责在你上头时挠一下。</p></div><button class="close" data-close>✕</button></div><div class="cat-tip"><div class="cat-avatar">🐱</div><div class="cat-bubble">${catMessage()}</div></div><div class="coach-toggle"><span>新手讲解模式</span><input type="checkbox" id="coachToggle" ${state.beginnerMode?'checked':''}></div><div class="cat-actions"><button data-term="ac">A/C类怎么选</button><button data-term="t1">三点和T+1</button><button data-term="drawdown">什么是回撤</button><button data-action="learn">打开入门课</button></div>`,()=>save())}
function openLearningCenter(){openModal(`<div class="modal-head"><div><h2>🌱 基金入门</h2><p>不会也没关系，先记住五件事。</p></div><button class="close" data-close>✕</button></div><div class="lesson"><b>1. 基金买入不会立刻出现份额</b><p>订单先提交，收盘按净值定价，之后再确认。</p></div><div class="lesson"><b>2. 15:00 是重要分界线</b><p>三点前通常属于今天，三点后通常顺延到下一交易日。</p></div><div class="lesson"><b>3. A/C 类主要差在费用</b><p>结合申购费、销售服务费、赎回费阶梯和持有时间一起算。</p></div><div class="lesson"><b>4. 涨得多的基金也可能更难拿住</b><p>收益和波动是一对绑定出售的东西。</p></div><div class="lesson"><b>5. 新闻利好不保证上涨</b><p>价格可能早已反映预期，资金也可能借利好兑现。</p></div>`)}
function tradeTimingText(type){const eff=effectiveDayForNewOrder(),f=state.dates[eff];if(state.stage<3)return `当前 ${currentTime()}：订单按今日收盘净值定价，15:00 前可撤单。`;return `当前已过 15:00：订单将于 ${f?dateLabel(f):'下一交易日'} 受理，在该日 15:00 前仍可撤单。`}
function openRecord(day){const r=state.records.find(x=>x.day===day);if(!r)return;const top=fundById(r.top.id),worst=fundById(r.worst.id);openModal(`<div class="modal-head"><div><h2>${dateLabel(r.date)} 复盘</h2><p>${r.news}</p></div><button class="close" data-close>✕</button></div><div class="metric-row"><div class="metric"><span>当日收益</span><b class="${cls(r.pnl)}">${fmtMoney(r.pnl)}</b></div><div class="metric"><span>收益率</span><b class="${cls(r.rate)}">${fmtPct(r.rate)}</b></div><div class="metric"><span>最强基金</span><b>${top.name}</b></div><div class="metric"><span>最弱基金</span><b>${worst.name}</b></div></div><div class="divider"></div><div class="hint">当日订单：${r.orders.length?r.orders.map(o=>`${o.type==='buy'?'买入':'卖出'} ${fundById(o.fundId).name}${o.shareClass}${o.reason?`（${BUY_REASONS[o.reason]}）`:''}`).join('；'):'没有交易。少做也可能是好决策。'}</div><div class="divider"></div><h3>🐱 决策质量复盘</h3>${decisionReviewHTML(r.decisionReviews||[])}`)}
function openAchievement(id){const a=ACHIEVEMENTS.find(x=>x.id===id);if(!a)return;const open=state.achievements.includes(id);openModal(`<div class="modal-head"><div><h2>${open?a.emoji:'🔒'} ${open?a.name:(a.hidden?'隐藏成就':a.name)}</h2><p>${open?'已经解锁':'还没有解锁'}</p></div><button class="close" data-close>✕</button></div><div class="card"><div class="hint"><b>解锁条件</b><br>${open||!a.hidden?a.condition:'条件暂时保密，彩蛋要自己撞见才好玩。'}</div><div class="divider"></div><div class="hint"><b>当前进度</b><br>${achievementProgress(a)}</div>${open?`<div class="divider"></div><div class="hint"><b>系统吐槽</b><br>${a.roast}</div><div class="divider"></div><div class="hint"><b>留下的教训</b><br>${a.lesson}</div>`:''}</div>`)}
function showTrades(){setPage('orders')}
function openEnding(){const e=state.ending;openModal(`<div style="text-align:center"><div style="font-size:56px">${e.emoji}</div><h2>${e.type}</h2><p>${e.text}</p></div><div class="metric-row"><div class="metric"><span>最终资产</span><b>${fmtMoney(e.asset)}</b></div><div class="metric"><span>总收益率</span><b class="${cls(e.return)}">${fmtPct(e.return)}</b></div><div class="metric"><span>累计费用</span><b>${fmtMoney(e.fees)}</b></div><div class="metric"><span>解锁成就</span><b>${e.achievements}</b></div></div><button class="secondary" data-action="reset-game">重新挑战</button>`)}
function openModal(html,after){$('#modal').innerHTML=html;$('#modalWrap').classList.add('show');$('#modalWrap').setAttribute('aria-hidden','false');after?.()}
function closeModal(){$('#modalWrap').classList.remove('show');$('#modalWrap').setAttribute('aria-hidden','true')}

function resetGame(){if(!confirm('重新开始会清空 V7 的持仓、订单和成就，并从 DAY 1 开始，确定吗？'))return;localStorage.removeItem(STORAGE_KEY);location.reload()}

function bindEvents(){
  document.addEventListener('click',e=>{
    const exp=e.target.closest('#experiencePick [data-experience]');if(exp){state.experience=exp.dataset.experience;state.beginnerMode=state.experience==='new';applyExperience();$$('#experiencePick [data-experience]').forEach(x=>x.classList.toggle('active',x===exp));return}
    const nav=e.target.closest('[data-nav]');if(nav)return setPage(nav.dataset.nav);
    if(e.target.closest('#themeBtn'))return toggleTheme();
    if(e.target.closest('#catBtn'))return openCat();
    const term=e.target.closest('[data-term]');if(term)return openLearning(term.dataset.term);
    if(e.target.closest('[data-action="learn"]'))return openLearningCenter();
    const page=e.target.closest('[data-page]');if(page)return setPage(page.dataset.page);
    const adv=e.target.closest('[data-action="advance"]');if(adv)return advanceTime();if(e.target.closest('[data-action="fast-close"]'))return fastClose();if(e.target.closest('[data-action="confirm-fast-close"]')){closeModal();return performFastClose()}if(e.target.closest('[data-action="review-orders"]')){closeModal();return setPage('orders')}
    const fund=e.target.closest('[data-fund]');if(fund&&!e.target.closest('[data-watch]'))return openFund(fund.dataset.fund,fund.dataset.mode||'buy',fund.dataset.class||'A');
    const watch=e.target.closest('[data-watch]');if(watch){e.stopPropagation();const id=watch.dataset.watch;state.watchlist=state.watchlist.includes(id)?state.watchlist.filter(x=>x!==id):[...state.watchlist,id];renderAll();return}
    const sec=e.target.closest('[data-sector]');if(sec){state.activeSector=sec.dataset.sector;renderMarket();return}
    const cancel=e.target.closest('[data-cancel]');if(cancel)return cancelOrder(cancel.dataset.cancel);
    const cal=e.target.closest('[data-cal-mode]');if(cal){state.calendarMode=cal.dataset.calMode;renderCalendar();save();return}
    const rec=e.target.closest('[data-record]');if(rec)return openRecord(Number(rec.dataset.record));
    const ach=e.target.closest('[data-achievement]');if(ach)return openAchievement(ach.dataset.achievement);
    if(e.target.closest('[data-close]'))return closeModal();
    const tm=e.target.closest('[data-trade-mode]');if(tm){const fid=$('[data-submit-buy],[data-submit-sell]')?.dataset.submitBuy||$('[data-submit-sell]')?.dataset.submitSell||$('#modal h2')?.dataset?.fid;const activeFundId=$('#modal').querySelector('[data-submit-buy]')?.dataset.submitBuy||$('#modal').querySelector('[data-submit-sell]')?.dataset.submitSell||state.__modalFund;if(state.__modalFund)renderTradePane(state.__modalFund,tm.dataset.tradeMode,'A');return}
    const share=e.target.closest('[data-share]');if(share){renderTradePane(state.__modalFund,'buy',share.dataset.share);return}
    const sellClass=e.target.closest('[data-sell-class]');if(sellClass){renderTradePane(state.__modalFund,'sell',sellClass.dataset.sellClass);return}
    const amt=e.target.closest('[data-amount]');if(amt){const input=$('#tradeAmount');if(input)input.value=amt.dataset.amount==='all'?Math.floor(state.cash):amt.dataset.amount;return}
    const sr=e.target.closest('[data-sell-ratio]');if(sr){const range=$('#sellRange');if(range){range.value=sr.dataset.sellRatio;range.dispatchEvent(new Event('input',{bubbles:true}))}return}
    const buy=e.target.closest('[data-submit-buy]');if(buy){return submitBuy(buy.dataset.submitBuy,buy.dataset.class,$('#tradeAmount')?.value,$('#buyReason')?.value,Number($('#planDays')?.value||20))}
    const sell=e.target.closest('[data-submit-sell]');if(sell){return submitSell(sell.dataset.submitSell,sell.dataset.class,Number($('#sellRange')?.value||50)/100)}
    if(e.target.closest('[data-action="show-trades"]'))return showTrades();
    if(e.target.closest('[data-action="reset-game"]'))return resetGame();
    if(e.target.closest('[data-action="open-news"]'))return setPage('news');
  });
  document.addEventListener('input',e=>{
    if(e.target.id==='planDays'||e.target.id==='tradeAmount'){if(state.__modalFund)updateFeeCompare(state.__modalFund)}

    if(e.target.id==='sellRange'){
      const pct=Number(e.target.value),btn=$('[data-submit-sell]');if(!btn)return;const h=getHolding(btn.dataset.submitSell,btn.dataset.class),f=fundById(btn.dataset.submitSell);if(!h)return;const units=availableUnits(h)*pct/100,preview=previewSellLots(h,units,f,classNav(f,h.shareClass),state.dates[effectiveDayForNewOrder()]||currentDate());$('#sellPct').textContent=pct+'%';$('#sellPreview').textContent=`预计卖出 ${units.toFixed(2)} 份，综合费率 ${(preview.weightedRate*100).toFixed(2)}%，预计到账 ${fmtMoney(preview.proceeds)}`;
    }
  });
  $('#modalWrap').addEventListener('click',e=>{if(e.target===$('#modalWrap'))closeModal()});
  $('#feedbackClose').addEventListener('click',closeFeedback);$('#feedback').addEventListener('click',e=>{if(e.target===$('#feedback'))closeFeedback()});
  $('#startBtn').addEventListener('click',()=>{state.started=true;applyExperience();state.currentPage=state.experience==='pro'?'market':'home';$('#boot').classList.add('hidden');$('#app').classList.remove('hidden');if(!state.currentMarket)createMarketForDay();state.dayStartAsset=totalAsset();updateEstimates();renderAll();save();setTimeout(()=>showFeedback('🌅','DAY 1 · 第一天投资',Cat.dayOneLines(dateLabel(currentDate()),state.experience),false),260)});
  $('#bellBtn').addEventListener('click',()=>{state.bellClicks++;if(state.bellClicks>=7)unlock('moon')});
  $('#brandEaster').addEventListener('click',()=>{state.brandClicks++;if(state.brandClicks>=7){unlock('moon');renderAchievements();save()}});
  $('#clockBtn').addEventListener('click',()=>openModal(`<div class="modal-head"><div><h2>交易时钟</h2><p>${dateLabel(currentDate())} ${currentTime()}</p></div><button class="close" data-close>✕</button></div><div class="timeline"><div class="timeline-item"><i></i><div><b>15:00 前</b><p>按当日收盘净值定价，可在截止前撤单。</p></div></div><div class="timeline-item"><i></i><div><b>15:00 及以后</b><p>订单顺延到下一交易日，按下一交易日净值定价。</p></div></div><div class="timeline-item"><i></i><div><b>下一交易日</b><p>买入份额确认；赎回资金根据基金类型继续等待到账。</p></div></div></div><div class="hint">本游戏采用简化模拟。真实产品的确认时间、到账时间与费用以基金合同和销售平台规则为准。</div>`));
}

if(state.started){$('#boot').classList.add('hidden');$('#app').classList.remove('hidden')}else{$$('#experiencePick [data-experience]').forEach(x=>x.classList.toggle('active',x.dataset.experience===state.experience))}
